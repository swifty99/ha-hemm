services:
  homeassistant:
    image: "ghcr.io/home-assistant/home-assistant:${HA_VERSION:-stable}"
    container_name: hemm-ha-test
    volumes:
      - ha-config:/config
      - ./custom_components/hemm:/config/custom_components/hemm:ro
      - ./tests/integration/config/configuration.yaml:/config/configuration.yaml:ro
      - ../hemm:/hemm-src:ro
    ports:
      - "8123:8123"
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:8123/api/onboarding"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: "no"
    networks:
      - ha-net

  companion:
    image: "ghcr.io/swifty99/hactl_companion:${COMPANION_VERSION:-latest}"
    container_name: hemm-companion-test
    environment:
      - SUPERVISOR_TOKEN=integration-test-token-12345
    volumes:
      - ha-config:/config
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9100/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      homeassistant:
        condition: service_healthy
    restart: "no"
    networks:
      - ha-net

volumes:
  ha-config:

networks:
  ha-net:
    driver: bridge
