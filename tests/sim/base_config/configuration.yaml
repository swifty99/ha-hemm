# Base HA configuration for all sim houses.
# House-specific automations are overlaid from houses/<name>/automations.yaml.

homeassistant:
  name: "HEMM Sim Home"
  unit_system: metric
  time_zone: Europe/Berlin
  currency: EUR

default_config:

# Safe-default and action scripts for all device types
script: !include scripts.yaml

# Automations are created dynamically via hactl auto create (registry-based).
# No file-based automation: !include needed.

# Mock entities for simulated sensor states.
# These input_booleans and input_numbers allow quirk automations to trigger
# without real hardware.

input_boolean:
  ev_plugged_in:
    name: "EV Plugged In"
    initial: true
    icon: mdi:ev-plug-type2
  hp_defrost_active:
    name: "Heat Pump Defrost Active"
    initial: false
    icon: mdi:snowflake-alert
  grid_reduction_active:
    name: "§14a Grid Reduction Active"
    initial: false
    icon: mdi:transmission-tower-off

input_number:
  battery_power:
    name: "Battery Power"
    min: -10
    max: 10
    step: 0.1
    unit_of_measurement: kW
    initial: 0
  ev_charger_power:
    name: "EV Charger Power"
    min: 0
    max: 22
    step: 0.1
    unit_of_measurement: kW
    initial: 0
  ev_battery_soc:
    name: "EV Battery SoC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 30
  house_base_load:
    name: "House Base Load"
    min: 0
    max: 10
    step: 0.1
    unit_of_measurement: kW
    initial: 0.3
  bedroom_temperature:
    name: "Bedroom Temperature"
    min: 10
    max: 35
    step: 0.5
    unit_of_measurement: "°C"
    initial: 19
  hp_power:
    name: "Heat Pump Power"
    min: 0
    max: 10
    step: 0.1
    unit_of_measurement: kW
    initial: 0
  dhw_temperature:
    name: "DHW Temperature"
    min: 10
    max: 90
    step: 0.5
    unit_of_measurement: "°C"
    initial: 50
  pool_temperature:
    name: "Pool Temperature"
    min: 10
    max: 40
    step: 0.5
    unit_of_measurement: "°C"
    initial: 26
  living_room_temperature:
    name: "Living Room Temperature"
    min: 10
    max: 35
    step: 0.5
    unit_of_measurement: "°C"
    initial: 21

# Template sensors for mock price feed and derived binary sensors
template:
  - sensor:
      - name: "Electricity Price"
        unique_id: sim_electricity_price
        unit_of_measurement: "EUR/kWh"
        state: >-
          {% set hour = now().hour %}
          {% if 0 <= hour < 6 %}
            0.18
          {% elif 6 <= hour < 9 %}
            0.38
          {% elif 9 <= hour < 14 %}
            0.22
          {% elif 14 <= hour < 17 %}
            0.28
          {% elif 17 <= hour < 20 %}
            0.45
          {% else %}
            0.30
          {% endif %}
        icon: mdi:currency-eur

  - binary_sensor:
      - name: "EV Plugged In"
        unique_id: sim_ev_plugged_in
        state: "{{ is_state('input_boolean.ev_plugged_in', 'on') }}"
        device_class: plug

      - name: "HP Defrost Active"
        unique_id: sim_hp_defrost_active
        state: "{{ is_state('input_boolean.hp_defrost_active', 'on') }}"

      - name: "Grid Reduction Active"
        unique_id: sim_grid_reduction_active
        state: "{{ is_state('input_boolean.grid_reduction_active', 'on') }}"
