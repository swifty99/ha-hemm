# Safe-default and action scripts for all sim house device types.
# These are no-ops — real actuator behavior is out of scope for sim.
# Each device in the config flow requires a safe_default_script entity to exist.

# --- Battery scripts ---
hemm_battery_safe:
  alias: "Battery Safe Default"
  sequence:
    - delay: "00:00:01"
  mode: single

battery_charge:
  alias: "Battery Charge"
  sequence:
    - delay: "00:00:01"
  mode: single

battery_discharge:
  alias: "Battery Discharge"
  sequence:
    - delay: "00:00:01"
  mode: single

battery_idle:
  alias: "Battery Idle"
  sequence:
    - delay: "00:00:01"
  mode: single

