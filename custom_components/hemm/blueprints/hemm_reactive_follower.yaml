blueprint:
  name: "HEMM — Reactive Follower Loop"
  description: >
    Reference implementation for reactive (control_class: reactive) devices.
    Runs a seconds-interval loop that reads the HEMM power setpoint sensor
    and calls a user-defined script to apply it. Stays within ±tolerance of
    the setpoint (Phase 2 will read envelope sensors; Phase 1 uses a fixed
    percentage tolerance from the setpoint).

    The user fills in the actuation script — vendor-specific logic stays
    outside HEMM. Typical use: wallbox PWM, modulating heating rod.
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:
    setpoint_sensor:
      name: HEMM Setpoint Sensor
      description: "The sensor.hemm_<device>_plan entity providing the power setpoint in kW."
      selector:
        entity:
          domain: sensor
    actuation_script:
      name: Actuation Script
      description: >
        Script entity to call with the target power. The script receives
        {{ setpoint_kw }} as a variable. Implement vendor-specific logic here.
      selector:
        entity:
          domain: script
    tolerance_pct:
      name: Tolerance (%)
      description: >
        Acceptable deviation from setpoint before correcting (default 15%).
        Phase 2 will use envelope sensors instead.
      default: 15
      selector:
        number:
          min: 5
          max: 50
          step: 5
          unit_of_measurement: "%"
    update_interval_seconds:
      name: Update Interval (seconds)
      description: >
        How often to read setpoint and correct. HA automations have a minimum
        of ~1s. For true sub-second control, use a dedicated script with a loop.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "s"

trigger:
  - platform: time_pattern
    seconds: !input update_interval_seconds

condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input setpoint_sensor
        state: "unavailable"
      - condition: state
        entity_id: !input setpoint_sensor
        state: "unknown"

action:
  - variables:
      setpoint_kw: "{{ states(trigger.entity_id if trigger.entity_id is defined else '') | float(0) }}"
      setpoint_raw: "{{ states(input.setpoint_sensor) | float(0) }}"
  - service: script.turn_on
    target:
      entity_id: !input actuation_script
    data:
      variables:
        setpoint_kw: "{{ setpoint_raw }}"

mode: single
max_exceeded: silent
