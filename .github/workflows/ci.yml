name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check custom_components/ tests/
          uv run ruff format --check custom_components/ tests/

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install hemm core (from GitHub)
        run: uv pip install git+https://github.com/swifty99/hemm.git

      - name: Test
        run: uv run pytest --cov=custom_components/hemm --cov-report=term-missing

  container-test:
    name: Container Tests (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ha-version: [stable, prev]
        include:
          - ha-version: stable
            image: ghcr.io/home-assistant/home-assistant:stable
            required: true
          - ha-version: prev
            image: ""
            required: true
          - ha-version: beta
            image: ghcr.io/home-assistant/home-assistant:beta
            required: false

    continue-on-error: ${{ !matrix.required }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --extra dev
          uv pip install git+https://github.com/swifty99/hemm.git

      - name: Compute previous HA version
        if: matrix.ha-version == 'prev'
        id: prev
        run: |
          prev_month=$(date -d "$(date +%Y-%m-01) -1 month" +%Y.%-m)
          echo "image=ghcr.io/home-assistant/home-assistant:${prev_month}" >> "$GITHUB_OUTPUT"

      - name: Set HA image
        id: image
        run: |
          img="${{ matrix.image }}"
          if [ -z "$img" ]; then
            img="${{ steps.prev.outputs.image }}"
          fi
          echo "ha_image=${img}" >> "$GITHUB_OUTPUT"

      - name: Start HA + companion stack
        run: docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 3
        env:
          HA_VERSION: ${{ matrix.ha-version }}

      - name: Pre-install hemm core into container
        run: docker exec hemm-ha-test pip install --quiet git+https://github.com/swifty99/hemm.git

      - name: Run container tests
        if: matrix.required
        run: uv run pytest tests/integration/ --tb=short -v -o "addopts="
        env:
          SKIP_DOCKER_COMPOSE: "1"
          HA_BASE_URL: http://localhost:8123
          HA_VERSION: ${{ matrix.ha-version }}

      - name: Run container tests (non-blocking)
        if: ${{ !matrix.required }}
        run: |
          if uv run pytest tests/integration/ --tb=short -v -o "addopts="; then
            echo "::notice::HA ${{ matrix.ha-version }} container tests passed"
          else
            echo "::warning::HA ${{ matrix.ha-version }} container tests failed (non-blocking)"
          fi
        env:
          SKIP_DOCKER_COMPOSE: "1"
          HA_BASE_URL: http://localhost:8123
          HA_VERSION: ${{ matrix.ha-version }}

      - name: Collect HA logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
