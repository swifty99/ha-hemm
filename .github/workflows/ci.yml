name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check custom_components/ tests/
          uv run ruff format --check custom_components/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install hemm core (from GitHub)
        run: uv pip install git+https://github.com/swifty99/hemm.git

      - name: Test
        run: uv run pytest --cov=custom_components/hemm --cov-report=term-missing

  container-test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        ha-version: ["2025.4", "2025.3"]
        include:
          - ha-version: "2025.5"
            experimental: true

    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --extra dev
          uv pip install git+https://github.com/swifty99/hemm.git

      - name: Start HA container (version ${{ matrix.ha-version }})
        run: |
          export HA_VERSION=${{ matrix.ha-version }}
          docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 3

      - name: Run container tests
        run: |
          uv run pytest tests/integration/ --tb=short -v -o "addopts="
        env:
          SKIP_DOCKER_COMPOSE: "1"
          HA_BASE_URL: http://localhost:8123
          HA_VERSION: ${{ matrix.ha-version }}

      - name: Collect HA logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
