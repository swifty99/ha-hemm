name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HEMM_CORE_REF: ${{ github.head_ref || github.ref_name }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check custom_components/ tests/
          uv run ruff format --check custom_components/ tests/

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install hemm core (matching branch if available)
        run: |
          if git ls-remote --exit-code --heads https://github.com/swifty99/hemm.git "$HEMM_CORE_REF" >/dev/null 2>&1; then
            uv pip install "git+https://github.com/swifty99/hemm.git@${HEMM_CORE_REF}"
          else
            uv pip install git+https://github.com/swifty99/hemm.git@main
          fi

      - name: Test
        run: uv run pytest --cov=custom_components/hemm --cov-report=term-missing

  container-test:
    name: Container Tests (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ha-version: [stable, prev, beta]
        include:
          - ha-version: stable
            required: true
          - ha-version: prev
            required: true
          - ha-version: beta
            required: false

    continue-on-error: ${{ !matrix.required }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --extra dev
          if git ls-remote --exit-code --heads https://github.com/swifty99/hemm.git "$HEMM_CORE_REF" >/dev/null 2>&1; then
            uv pip install "git+https://github.com/swifty99/hemm.git@${HEMM_CORE_REF}"
          else
            uv pip install git+https://github.com/swifty99/hemm.git@main
          fi

      - name: Compute HA image tag
        id: image
        run: |
          case "${{ matrix.ha-version }}" in
            prev)
              tag=$(date -d "$(date +%Y-%m-01) -1 month" +%Y.%-m)
              ;;
            *)
              tag="${{ matrix.ha-version }}"
              ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Start HA container
        run: docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 3
        env:
          HA_VERSION: ${{ steps.image.outputs.tag }}

      - name: Install hemm + companion inside container
        run: |
          if git ls-remote --exit-code --heads https://github.com/swifty99/hemm.git "$HEMM_CORE_REF" >/dev/null 2>&1; then
            core_url="git+https://github.com/swifty99/hemm.git@${HEMM_CORE_REF}"
          else
            core_url="git+https://github.com/swifty99/hemm.git@main"
          fi
          docker exec hemm-ha-test pip install --quiet "$core_url"
          docker exec hemm-ha-test pip install --quiet git+https://github.com/swifty99/hactl_companion.git

      - name: Occupants core smoke inside container
        run: docker exec hemm-ha-test python -c "import hemm_core.sim.occupants"

      - name: Restart HA to load hemm
        run: |
          docker restart hemm-ha-test
          echo "Waiting for HA to become healthy after restart..."
          for i in $(seq 1 60); do
            if curl -so /dev/null http://localhost:8123/api/onboarding 2>/dev/null; then
              echo "HA healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8123/api/onboarding || { echo "::error::HA not healthy after restart"; exit 1; }
        timeout-minutes: 3

      - name: Start companion inside HA
        run: |
          docker exec -d hemm-ha-test sh -c 'SUPERVISOR_TOKEN=integration-test-token-12345 python3 -m companion'
          echo "Waiting for companion to become healthy..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9100/v1/health >/dev/null 2>&1; then
              echo "Companion healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:9100/v1/health || echo '::warning::Companion not healthy (tests may skip)'

      - name: Run container tests
        if: matrix.required
        run: uv run pytest tests/integration/ --tb=short -v -o "addopts="
        env:
          SKIP_DOCKER_COMPOSE: "1"
          HA_BASE_URL: http://localhost:8123
          HA_VERSION: ${{ steps.image.outputs.tag }}

      - name: Run container tests (non-blocking)
        if: ${{ !matrix.required }}
        run: |
          if uv run pytest tests/integration/ --tb=short -v -o "addopts="; then
            echo "::notice::HA ${{ matrix.ha-version }} container tests passed"
          else
            echo "::warning::HA ${{ matrix.ha-version }} container tests failed (non-blocking)"
          fi
        env:
          SKIP_DOCKER_COMPOSE: "1"
          HA_BASE_URL: http://localhost:8123
          HA_VERSION: ${{ steps.image.outputs.tag }}

      - name: Collect HA logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  warp-test:
    name: Warp Smoke Tests (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        mode: [auto, fixed]
        include:
          - mode: auto
            warp_speed: ""
          - mode: fixed
            warp_speed: "100"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build warp image
        run: docker compose -f docker-compose.warp.yml build

      - name: Start warp container
        run: docker compose -f docker-compose.warp.yml up -d --wait
        timeout-minutes: 5
        env:
          WARP_SPEED: ${{ matrix.warp_speed }}

      - name: Wait for PI ramp (auto mode)
        if: matrix.mode == 'auto'
        run: sleep 15

      - name: Run warp smoke tests
        run: uv run pytest tests/warp/test_warp_smoke.py -v --tb=short -m warp -o "addopts="
        env:
          WARP_SPEED: ${{ matrix.warp_speed }}

      - name: Collect warp logs on failure
        if: failure()
        run: docker logs hemm-ha-warp 2>&1 | tail -50

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.warp.yml down -v --remove-orphans
